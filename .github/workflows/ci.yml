name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            portal/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix portal

      - name: Build and test
        run: |
          npm run compile
          npm run build --prefix backend
          npm run build --prefix portal
          npm test

      - name: Apply and smoke-test migrations
        run: |
          psql -v ON_ERROR_STOP=1 -c "CREATE ROLE anon; CREATE ROLE authenticated; CREATE ROLE service_role BYPASSRLS; CREATE SCHEMA auth; CREATE TABLE auth.users (id uuid PRIMARY KEY);"
          for migration in backend/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "$migration"
          done
          psql -v ON_ERROR_STOP=1 -f backend/tests/migration-smoke.sql

      - name: Package extension
        run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: latency-vsix
          path: "*.vsix"
